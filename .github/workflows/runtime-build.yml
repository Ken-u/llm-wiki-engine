name: Runtime Build

on:
  workflow_dispatch:
  push:
    paths:
      - "app/runtime/**"
      - "app/runtime_main.py"
      - "packaging/runtime/**"
      - "runtime-config.example.yaml"
      - "scripts/build-runtime.*"
      - "scripts/build-runtime-bundle.*"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  build:
    name: Build runtime (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            dir: linux-x86_64
            artifact: llm-wiki-runtime
          - platform: windows
            os: windows-latest
            dir: windows-x86_64
            artifact: llm-wiki-runtime.exe
          - platform: macos
            os: macos-latest
            dir: macos-arm64
            artifact: llm-wiki-runtime

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run runtime tests
        run: uv run pytest tests/test_litellm_startup.py tests/test_runtime_api.py

      - name: Build runtime
        shell: bash
        run: |
          rm -rf dist/.tmp-runtime-build
          uv run pyinstaller --clean --noconfirm --distpath dist/.tmp-runtime-build packaging/runtime/llm-wiki-runtime.spec

      - name: Prepare artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf artifact dist/runtime-package
          mkdir -p "dist/runtime-package/${{ matrix.dir }}"
          cp "dist/.tmp-runtime-build/${{ matrix.artifact }}" "dist/runtime-package/${{ matrix.dir }}/${{ matrix.artifact }}"
          cp runtime-config.example.yaml "dist/runtime-package/${{ matrix.dir }}/runtime-config.example.yaml"
          cp -R packaging/runtime/hooks "dist/runtime-package/${{ matrix.dir }}/hooks"
          cp scripts/build-runtime-bundle.sh "dist/runtime-package/${{ matrix.dir }}/build-runtime-bundle.sh"
          cp scripts/build-runtime-bundle.bat "dist/runtime-package/${{ matrix.dir }}/build-runtime-bundle.bat"
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile
          
          platform_dir = "${{ matrix.dir }}"
          root = Path("dist/runtime-package")
          zip_path = Path(f"artifact/runtime-{platform_dir}.zip")
          zip_path.parent.mkdir(parents=True, exist_ok=True)
          with ZipFile(zip_path, "w", ZIP_DEFLATED) as zf:
              for path in sorted((root / platform_dir).rglob("*")):
                  if path.is_file():
                      zf.write(path, Path(platform_dir) / path.relative_to(root / platform_dir))
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-${{ matrix.dir }}
          path: artifact/runtime-${{ matrix.dir }}.zip
